name: WakaTime Stats

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  update-readme:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Updated WakaTime stats"
